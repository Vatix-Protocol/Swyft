name: Database Migrations

on:
  pull_request:
    paths:
      - "apps/api/prisma/**"
      - "prisma/**"
      - "apps/api/package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/db-migrations.yml"

jobs:
  db-migrations:
    name: db-migrations
    runs-on: ubuntu-latest
    timeout-minutes: 1

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: swyft_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d swyft_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/swyft_test?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm prisma validate --schema prisma/schema.prisma

      - name: Generate Prisma client
        run: pnpm prisma generate --schema prisma/schema.prisma

      - name: Apply migrations
        run: pnpm prisma migrate deploy --schema prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/swyft_test?schema=public

      - name: Check migration status
        run: pnpm prisma migrate status --schema prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/swyft_test?schema=public
